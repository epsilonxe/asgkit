services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: asgkit
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    # Published to the host for convenience (e.g. connecting a local MySQL
    # client for debugging) - the app itself reaches mysql via the
    # compose network below, not this published port.
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_NAME: asgkit
      UPLOADS_BASE: /data/uploads
      PORT: 3000
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    volumes:
      - ./uploads:/data/uploads
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
